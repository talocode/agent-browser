name: Agent Browser check with optional vision

on:
  workflow_dispatch:

jobs:
  browser-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install optional vision module
        run: |
          cd python/agent-browser-vision
          python3 -m pip install -e ".[dev]"
        shell: bash

      - name: Smoke check with vision inspect
        uses: talocode/agent-browser@v0
        with:
          url: https://example.com
          screenshot-out: agent-browser-screenshot.png
          vision: "true"
          fail-on-blank: "true"
          upload-artifact: "true"